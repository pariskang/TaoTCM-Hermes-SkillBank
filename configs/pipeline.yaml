project_name: canon-tcm-hermes
protocol_version: v5.0
input:
  required_columns: [book, volume, chapter, content]
  optional_columns: [version, page, source_note, editor_note]
run:
  checkpoint: true
  resume: true
  atomic_write: true
  write_raw_llm_output: true
llm:
  provider: litellm
  model_env: LITELLM_MODEL
  temperature:
    genre_router: 0.0
    annotation: 0.1
    aggregation: 0.05
    skill_generation: 0.1
  max_retries: 4
  max_concurrency: 5
outputs:
  base_dir: outputs
  jsonl: true
  sqlite_progress: true
